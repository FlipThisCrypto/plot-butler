name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check
        run: python3 -m py_compile plot_butler.py
      - name: Unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Shell syntax
        run: bash -n plotter_loop.sh plot_capacity_guard.sh scripts/smoke_check.sh install-systemd.sh
